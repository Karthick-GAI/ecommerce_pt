# E-Commerce AI Platform — Podman / Docker Compose
#
# ONE-COMMAND STARTUP
#   cp .env.example .env            # fill AZURE_OPENAI_* credentials
#   bash scripts/compose_up.sh      # handles port conflict + starts everything
#
# Or manually:
#   podman stop podman-postgres kartai-db 2>/dev/null || true
#   podman-compose up -d
#
# ACCESS (all via http://localhost:PORT)
#   3000  Frontend (React SPA)
#   8000  user_management       /docs
#   8001  product_catalogue     /docs
#   8002  shopping_assistant    /docs
#   8003  checkout_service      /docs
#   8004  order_management      /docs
#   8005  inventory_service     /docs
#   8006  recommendation_engine /docs
#   8007  tool_calling_agent    /docs
#   8008  session_service       /docs
#   8009  payment_shipping      /docs
#   8010  guardrails_service    /docs
#   8011  multi_agent_system    /docs
#   8012  seller_portal         /docs
#   5432  PostgreSQL
#
# NETWORK NOTE (WSL2 / rootless Podman)
#   Bridge network inter-container routing requires ip_forward=1.
#   In WSL2 rootless Podman this is not settable without root.
#   All services use network_mode: host — every container shares
#   the host network stack, so services connect to localhost:5432 directly.
#   Port mappings are ignored with host networking; each service binds
#   to its port on the host directly.
#
# AZURE OPENAI
#   Required only for: product_catalogue, shopping_assistant,
#   multi_agent_system, tool_calling_agent.
#   The other 9 services run fine without Azure credentials.
#
# VOLUME NOTE
#   pgdata is an external Podman volume containing 6,525 products with
#   pre-computed embeddings. To start completely fresh:
#       podman volume create pgdata
#       podman-compose up -d
#       podman-compose exec product_catalogue python seed_data.py
#       podman-compose exec product_catalogue python generate_dataset.py

version: "3.9"

services:

  # ── Database ────────────────────────────────────────────────────────────────

  postgres:
    image: docker.io/ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgre_catalogue
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    network_mode: host
    restart: unless-stopped

  # ── SQLite-backed services ───────────────────────────────────────────────────

  user_management:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: user_management
        PORT: "8000"
    volumes:
      - user_mgmt_data:/app/data
    env_file: .env
    environment:
      PORT: "8000"
      USER_DB_URL: "sqlite:////app/data/ecommerce.db"
    network_mode: host
    restart: unless-stopped
    depends_on: [postgres]

  seller_portal:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: seller_portal
        PORT: "8012"
    volumes:
      - seller_portal_data:/app/data
    env_file: .env
    environment:
      PORT: "8012"
      DATABASE_URL_SELLER: "sqlite:////app/data/seller_portal.db"
    network_mode: host
    restart: unless-stopped

  # ── PostgreSQL-backed services ───────────────────────────────────────────────
  # DATABASE_URL uses localhost:5432 because all containers share the host network.

  product_catalogue:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: product_catalogue
        PORT: "8001"
    env_file: .env
    environment:
      PORT: "8001"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  shopping_assistant:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: shopping_assistant
        PORT: "8002"
    env_file: .env
    environment:
      PORT: "8002"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  checkout_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: checkout_service
        PORT: "8003"
    env_file: .env
    environment:
      PORT: "8003"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  order_management:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: order_management
        PORT: "8004"
    env_file: .env
    environment:
      PORT: "8004"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  inventory_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: inventory_service
        PORT: "8005"
    env_file: .env
    environment:
      PORT: "8005"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  recommendation_engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: recommendation_engine
        PORT: "8006"
    env_file: .env
    environment:
      PORT: "8006"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  tool_calling_agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: tool_calling_agent
        PORT: "8007"
    env_file: .env
    environment:
      PORT: "8007"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  session_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: session_service
        PORT: "8008"
    env_file: .env
    environment:
      PORT: "8008"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  payment_shipping_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: payment_shipping_service
        PORT: "8009"
    env_file: .env
    environment:
      PORT: "8009"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  guardrails_service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: guardrails_service
        PORT: "8010"
    env_file: .env
    environment:
      PORT: "8010"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  multi_agent_system:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_DIR: multi_agent_system
        PORT: "8011"
    env_file: .env
    environment:
      PORT: "8011"
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgre_catalogue"
    network_mode: host
    depends_on: [postgres]
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  pgdata:
    external: true        # existing Podman volume — 6,525 products + embeddings
  user_mgmt_data:         # user accounts SQLite
  seller_portal_data:     # seller accounts SQLite
