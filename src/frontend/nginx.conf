server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html — it must always be re-fetched so the browser
    # picks up new hashed JS/CSS filenames after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # React SPA: all unknown paths fall back to index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for hashed static assets produced by the Vite build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
